# if given, will override the device setting in gym.
env:
  numEnvs: 1
  envSpacing: 5
  episodeLength: 300
  enableDebugVis: False
  playdataset: False
  saveImages: False
  pdControl: True
  powerScale: 1.0
  controlFrequencyInv: 2 # 30 Hz
  numObs: 789
  motion_file: custom_mano
  robotType: "smplx/grab_s1_hand.xml"

  keyBodies: ["L_Wrist", "L_Index1", "L_Index2", "L_Index3", "L_Middle1", "L_Middle2", "L_Middle3", "L_Pinky1", "L_Pinky2", "L_Pinky3", "L_Ring1", "L_Ring2", "L_Ring3", "L_Thumb1", "L_Thumb2", "L_Thumb3","R_Wrist", "R_Index1", "R_Index2", "R_Index3", "R_Middle1", "R_Middle2", "R_Middle3", "R_Pinky1", "R_Pinky2", "R_Pinky3", "R_Ring1", "R_Ring2", "R_Ring3", "R_Thumb1", "R_Thumb2", "R_Thumb3"]
  contactBodies: ["L_Wrist", "L_Index1", "L_Index2", "L_Index3", "L_Middle1", "L_Middle2", "L_Middle3", "L_Pinky1", "L_Pinky2", "L_Pinky3", "L_Ring1", "L_Ring2", "L_Ring3", "L_Thumb1", "L_Thumb2", "L_Thumb3","R_Wrist", "R_Index1", "R_Index2", "R_Index3", "R_Middle1", "R_Middle2", "R_Middle3", "R_Pinky1", "R_Pinky2", "R_Pinky3", "R_Ring1", "R_Ring2", "R_Ring3", "R_Thumb1", "R_Thumb2", "R_Thumb3"]
  terminationHeight: 0.15

  asset:
    assetRoot: "intermimic/data/assets"

  plane:
    staticFriction: 1.0
    dynamicFriction: 1.0
    restitution: 1.0

sim:
  substeps: 2
  physx:
    num_threads: 4
    solver_type: 0  # 0: pgs, 1: tgs
    num_position_iterations: 4
    num_velocity_iterations: 1
    contact_offset: 0.001
    rest_offset: 0.0
    bounce_threshold_velocity: 0.2
    max_depenetration_velocity: 10.0
    default_buffer_size_multiplier: 10.0

  flex:
    num_inner_iterations: 10
    warm_start: 0.25
